name: Deploy to Cloudflare Pages

# Build + deploy on every push to main (merge = publish). Replaces the manual
# `wrangler pages deploy`. Until the two secrets below exist the deploy step is
# skipped (the job still succeeds), so manual `wrangler pages deploy` keeps working.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — scoped token: Account › Cloudflare Pages › Edit (NOT the Global key)
#   CLOUDFLARE_ACCOUNT_ID  — 7accb3afddfafa68d9fcaad27a128222

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Cloudflare secrets are present
        id: check
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$TOKEN" ] && [ -n "$ACCOUNT" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set — skipping deploy. Add them to enable auto-deploy; deploy manually with 'wrangler pages deploy dist' in the meantime."
          fi

      - uses: actions/setup-node@v4
        if: steps.check.outputs.ready == 'true'
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        if: steps.check.outputs.ready == 'true'

      - run: npm run build
        if: steps.check.outputs.ready == 'true'

      - name: Deploy to Cloudflare Pages
        if: steps.check.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=soraia-site --branch=main
