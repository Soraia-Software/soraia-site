name: Blog quality gates

# Runs the 5 adversarial gates (fact-check, originality, brand-voice, SEO/structure,
# GEO-citability) on any PR touching blog content, posts a scorecard comment, and
# fails the check if any gate fails. Requires ANTHROPIC_API_KEY.
#
# Auto-publish: if the repo variable AUTOPUBLISH == 'true' AND all gates pass on a bot
# draft branch (blog/*), the `autopublish` job flips draft:false and merges the PR with
# BLOG_BOT_TOKEN (so deploy.yml fires) — no human approval. A FAILED gate leaves the PR
# open for a human. Invariant: draft:false is set ONLY after all gates pass, so a
# failed-gate PR stays hidden in prod even if merged. Flip AUTOPUBLISH to disable.

on:
  pull_request:
    paths:
      - "src/content/blog/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Run quality gates
        id: gates
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GATE_MODEL: ${{ vars.GATE_MODEL }}
        run: node automation/quality-gates.mjs

      - name: Post scorecard comment
        if: always() && hashFiles('automation/.gate-report.md') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file automation/.gate-report.md --repo "${{ github.repository }}"

      - name: Enforce gate result
        if: steps.gates.outcome == 'failure'
        run: |
          echo "::error::One or more blog quality gates failed — see the scorecard comment on the PR."
          exit 1

  # Auto-publish on green: only runs if `gates` succeeded (all gates passed), the
  # AUTOPUBLISH variable is on, and this is a bot draft branch. Flips draft:false and
  # merges with the PAT so deploy.yml ships it — no human approval needed.
  autopublish:
    needs: gates
    if: vars.AUTOPUBLISH == 'true' && startsWith(github.head_ref, 'blog/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.BLOG_BOT_TOKEN }}
          fetch-depth: 0
      - name: Flip draft:false + merge
        env:
          GH_TOKEN: ${{ secrets.BLOG_BOT_TOKEN }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          files=$(gh pr view "$PR" --repo "${{ github.repository }}" --json files -q '.files[].path' | grep -E '^src/content/blog/.*\.md$' || true)
          [ -z "$files" ] && { echo "no blog files in PR; nothing to publish"; exit 0; }
          echo "$files" | while IFS= read -r f; do [ -n "$f" ] && [ -f "$f" ] && sed -i 's/^draft: true\b/draft: false/' "$f"; done
          git config user.name "soraia-blog-bot"
          git config user.email "162421143+danlevsoraia94@users.noreply.github.com"
          if ! git diff --quiet; then
            git commit -am "Auto-publish: all gates passed, draft:false [skip ci]"
            git push origin HEAD:"${{ github.head_ref }}"
          fi
          # Explicit subject/body so the flip commit's "[skip ci]" doesn't leak into the
          # squash-merge message (which would skip deploy.yml on the push to main).
          for i in 1 2 3 4 5; do
            if gh pr merge "$PR" --squash --delete-branch --subject "Auto-publish blog post (PR #$PR, all gates passed)" --body "" --repo "${{ github.repository }}"; then exit 0; fi
            echo "merge not ready; retry in 10s"; sleep 10
          done
          echo "::error::auto-publish merge failed after retries"; exit 1
